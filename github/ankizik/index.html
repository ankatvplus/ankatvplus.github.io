<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>ANKA MÜZİK | Dijital Müzik Deneyimi</title>
    <!-- Font Awesome 6 (free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 20% 30%, #0a0c12, #030507);
            color: #f0f0f0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* HAMBURGER MENÜ (SOL TARAF) */
        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(4px);
            z-index: 998;
            opacity: 0;
            visibility: hidden;
            transition: 0.3s ease;
        }
        .menu-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .sidebar {
            position: fixed;
            top: 0;
            left: -320px;
            width: 300px;
            max-width: 85vw;
            height: 100%;
            background: rgba(10, 14, 23, 0.98);
            backdrop-filter: blur(16px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 999;
            transition: left 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            display: flex;
            flex-direction: column;
            padding: 24px 16px 20px 20px;
            box-shadow: 4px 0 30px rgba(0,0,0,0.5);
        }

        .sidebar.open {
            left: 0;
        }

        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 16px;
        }
        .sidebar-header h3 {
            font-weight: 700;
            background: linear-gradient(135deg, #F0B90B, #FF5E7C);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 1.7rem;
        }
        .close-menu {
            background: none;
            border: none;
            color: #ccc;
            font-size: 1.8rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .close-menu:hover { color: #fff; transform: scale(1.05);}

        /* arama */
        .search-box {
            background: rgba(255,255,255,0.08);
            border-radius: 40px;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 28px;
            border: 1px solid rgba(255,255,255,0.15);
        }
        .search-box i { color: #F0B90B; font-size: 1.1rem;}
        .search-box input {
            background: transparent;
            border: none;
            outline: none;
            color: white;
            width: 100%;
            font-size: 0.9rem;
        }
        .search-box input::placeholder { color: #aaa;}

        /* kategori başlık */
        .menu-category {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #F0B90B;
            margin: 16px 0 8px 0;
        }
        .menu-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 10px 12px;
            margin: 4px 0;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 500;
            color: #ddd;
        }
        .menu-item i { width: 24px; font-size: 1.2rem; color: #F0B90B;}
        .menu-item:hover { background: rgba(240,185,11,0.15); color: white; transform: translateX(4px);}
        .playlist-item { padding-left: 30px; font-size: 0.9rem; gap: 12px;}

        .new-list-btn {
            background: rgba(240,185,11,0.2);
            border: 1px dashed #F0B90B;
            border-radius: 40px;
            padding: 10px;
            text-align: center;
            margin-top: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .new-list-btn:hover { background: rgba(240,185,11,0.4);}

        /* ANA SAYFA İÇERİK */
        .main-container {
            margin-left: 0;
            transition: margin 0.2s;
            padding: 20px 20px 100px 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        /* header */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .hamburger-icon {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            border-radius: 40px;
            padding: 12px 18px;
            font-size: 1.6rem;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.2);
            width: fit-content;
        }
        .app-title {
            font-weight: 800;
            font-size: 1.8rem;
            background: linear-gradient(135deg, #F0B90B, #FFB347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .home-btn {
            background: rgba(240,185,11,0.2);
            border: none;
            padding: 8px 18px;
            border-radius: 50px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .home-btn:hover { background: #F0B90B; color: #0a0c12;}

        /* PLAYER KARTI - resimdeki gibi modern */
        .music-player-card {
            background: rgba(20, 24, 35, 0.7);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 28px 24px;
            margin: 20px 0;
            box-shadow: 0 25px 40px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.2s;
        }
        .album-art {
            text-align: center;
            margin-bottom: 20px;
        }
        .album-art img {
            width: 220px;
            height: 220px;
            border-radius: 32px;
            object-fit: cover;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5);
            border: 2px solid rgba(240,185,11,0.4);
        }
        .song-info {
            text-align: center;
            margin: 12px 0 10px;
        }
        .song-title {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .artist-name {
            font-size: 1rem;
            color: #bbb;
            margin-top: 6px;
        }
        .vevo-badge {
            display: inline-block;
            background: #00000080;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: bold;
            letter-spacing: 1px;
            margin-top: 8px;
        }
        .progress-area {
            margin: 20px 0 10px;
        }
        .progress-bar {
            width: 100%;
            height: 5px;
            background: #3a3e4a;
            border-radius: 10px;
            cursor: pointer;
        }
        .progress-fill {
            width: 0%;
            height: 5px;
            background: linear-gradient(90deg, #F0B90B, #FF7E5E);
            border-radius: 10px;
        }
        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            margin-top: 8px;
            color: #aaa;
        }
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 28px;
            margin: 24px 0 12px;
        }
        .ctrl-btn {
            background: none;
            border: none;
            color: white;
            font-size: 1.8rem;
            cursor: pointer;
            transition: 0.1s;
        }
        .ctrl-btn.play-pause {
            background: #F0B90B;
            width: 60px;
            height: 60px;
            border-radius: 60px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #0a0c12;
            font-size: 2rem;
            box-shadow: 0 5px 15px rgba(240,185,11,0.3);
        }
        .extra-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 8px;
        }
        .extra-buttons button {
            background: #1e1f2c;
            border: none;
            color: #F0B90B;
            font-size: 1.2rem;
            padding: 8px 14px;
            border-radius: 40px;
            cursor: pointer;
        }

        /* İÇERİK LİSTELERİ (KATEGORİ / ŞARKI LİSTESİ) */
        .content-panel {
            background: rgba(12, 15, 24, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 20px;
            margin-top: 20px;
        }
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 12px;
        }
        .panel-header h2 { font-size: 1.4rem; font-weight: 600; }
        .song-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 380px;
            overflow-y: auto;
        }
        .song-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.03);
            padding: 10px 16px;
            border-radius: 20px;
            transition: 0.1s;
            cursor: pointer;
        }
        .song-item:hover { background: rgba(240,185,11,0.2);}
        .song-details { flex: 2; }
        .song-details strong { display: block; font-size: 0.9rem;}
        .song-details span { font-size: 0.7rem; color: #bbb;}
        .song-actions {
            display: flex;
            gap: 12px;
        }
        .song-actions i {
            font-size: 1.1rem;
            cursor: pointer;
            color: #F0B90B;
        }
        .fa-heart.fas { color: #ff4d6d; }
        .add-to-list-btn { cursor: pointer; }

        @media (max-width: 550px) {
            .album-art img { width: 160px; height: 160px; }
            .song-title { font-size: 1.3rem; }
            .controls { gap: 18px; }
            .ctrl-btn.play-pause { width: 50px; height: 50px; font-size: 1.5rem;}
        }
        /* TV box için odaklanabilir butonlar */
        button, .menu-item, .song-item { cursor: pointer; transition: all 0.1s;}
        ::-webkit-scrollbar { width: 4px; }
    </style>
</head>
<body>

<div class="menu-overlay" id="menuOverlay"></div>
<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <h3>ANKA MÜZİK</h3>
        <button class="close-menu" id="closeMenuBtn"><i class="fas fa-times"></i></button>
    </div>
    <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="globalSearch" placeholder="Şarkı, sanatçı ara...">
    </div>
    <div class="menu-category">KEŞFET</div>
    <div class="menu-item" data-category="top">
        <i class="fas fa-chart-line"></i> <span>En Çok Dinlenen</span>
    </div>
    <div class="menu-item" data-category="recent">
        <i class="fas fa-clock"></i> <span>Son Dinlenenler</span>
    </div>
    <div class="menu-item" data-category="hits">
        <i class="fas fa-fire"></i> <span>Hit Müzikler</span>
    </div>
    <div class="menu-item" data-category="foreign">
        <i class="fas fa-globe"></i> <span>Yabancı Müzikler</span>
    </div>
    <div class="menu-item" data-category="favorites">
        <i class="fas fa-heart"></i> <span>Favorilerim</span>
    </div>
    <div class="menu-category">ÖZEL LİSTELERİM</div>
    <div id="customListsContainer"></div>
    <div class="new-list-btn" id="createListBtn">
        <i class="fas fa-plus-circle"></i> Yeni Liste Oluştur
    </div>
</div>

<div class="main-container">
    <div class="top-bar">
        <div class="hamburger-icon" id="hamburgerBtn">
            <i class="fas fa-bars"></i>
        </div>
        <div class="app-title">ANKA MÜZİK</div>
        <button class="home-btn" id="homePageBtn"><i class="fas fa-home"></i> Ana Sayfa</button>
    </div>

    <!-- PLAYER GÖRÜNÜMÜ (resimdeki gibi) -->
    <div class="music-player-card">
        <div class="album-art">
            <img id="currentCover" src="https://picsum.photos/id/104/300/300" alt="cover">
        </div>
        <div class="song-info">
            <div class="song-title" id="currentTitle">Fame is a Gun</div>
            <div class="artist-name" id="currentArtist">Addison Rae</div>
            <div class="vevo-badge"><i class="fab fa-soundcloud"></i> ANKA STUDIO</div>
        </div>
        <div class="progress-area">
            <div class="progress-bar" id="progressBarBg">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="time-info">
                <span id="currentTime">0:00</span>
                <span id="durationTime">0:00</span>
            </div>
        </div>
        <div class="controls">
            <button class="ctrl-btn" id="shuffleBtn"><i class="fas fa-random"></i></button>
            <button class="ctrl-btn" id="prevBtn"><i class="fas fa-step-backward"></i></button>
            <button class="ctrl-btn play-pause" id="playPauseBtn"><i class="fas fa-play"></i></button>
            <button class="ctrl-btn" id="nextBtn"><i class="fas fa-step-forward"></i></button>
            <button class="ctrl-btn" id="repeatBtn"><i class="fas fa-redo-alt"></i></button>
        </div>
        <div class="extra-buttons">
            <button id="stopBtn"><i class="fas fa-stop"></i> x</button>
            <button id="infoBtn"><i class="fas fa-info-circle"></i> I</button>
            <button id="rewind10Btn"><i class="fas fa-backward"></i> ⌫</button>
            <button id="shuffleModeBtn"><i class="fas fa-exchange-alt"></i> ⌬</button>
        </div>
    </div>

    <!-- İÇERİK PANEL (kategori listeleri) -->
    <div class="content-panel" id="contentPanel">
        <div class="panel-header">
            <h2 id="panelTitle">🔥 Öne Çıkanlar</h2>
        </div>
        <div class="song-list" id="songListContainer">
            <!-- Dinamik şarkı listesi -->
        </div>
    </div>
</div>

<script>
    // ---------- MOCK ŞARKI VERİLERİ ----------
    const masterSongs = [
        { id: "s1", title: "hakkını helal eyle", artist: "Müslüm gürses", cover: "https://picsum.photos/id/100/300/300", url: "https://replay.az/uploads/tracks/1092002987_136545033_1096902128.mp3", playCount: 2840, category: "ARABESK,DAMAR" },
        { id: "s2", title: "silinmeyen hatıralar", artist: "Müslüm gürses", cover: "https://picsum.photos/id/20/300/300", url: "https://replay.az/uploads/tracks/1110251190_1740283971_963578527.mp3", playCount: 3120, category: "hit,foreign" },
        { id: "s3", title: "gitti", artist: "müslüm gürses", cover: "https://picsum.photos/id/30/300/300", url: "https://replay.az/uploads/tracks/429457339_888932909_1544165831.mp3", playCount: 4500, category: "hit,foreign" },
        { id: "s4", title: "anlasana", artist: "müslüm gürses", cover: "https://picsum.photos/id/42/300/300", url: "https://replay.az/uploads/tracks/1982866332_1340156844_125989166.mp3", playCount: 1800, category: "hit" },
        { id: "s5", title: "hilebaz", artist: "müslüm gürses", cover: "https://picsum.photos/id/82/300/300", url: "https://mp3semticdn.com/mp3_files/Muslum-Gurses/Zavallim-2000/Muslum-Gurses-Hilebaz-52.mp3", playCount: 6700, category: "hit,foreign" },
        { id: "s6", title: "yıllar utansin", artist: "müslüm gürses", cover: "https://picsum.photos/id/169/300/300", url: "https://mp3semticdn.com/mp3_files/Muslum-Gurses/Muslum-Gurses-8D-Sarkilar/Muslum-Gurses-Yillar-Utansin-8D.mp3", playCount: 5100, category: "hit,foreign" },
        { id: "s7", title: "sarhoş gibiyim", artist: "müslüm gürses", cover: "https://picsum.photos/id/155/300/300", url: "https://mp3semticdn.com/mp3_files/Muslum-Gurses/Talihsizler/Muslum-Gurses-Sarhos-Gibiyim-67.mp3", playCount: 950, category: "hit" }
    ];
    // kullanıcı favorileri ve özel listeler, son dinlenenler
    let favoriteIds = JSON.parse(localStorage.getItem("anka_favs")) || ["s1"];
    let customLists = JSON.parse(localStorage.getItem("anka_lists")) || { "Gece Modu": ["s2","s5"], "Yolculuk": ["s1","s6"] };
    let recentPlayIds = JSON.parse(localStorage.getItem("anka_recent")) || [];
    
    // Player state
    let currentSongId = "s1";
    let currentPlaylistQueue = [];   // şarkı id listesi (sıra)
    let queueIndex = 0;
    let isPlaying = false;
    let shuffleActive = false;
    let repeatActive = false;
    let audio = new Audio();
    
    // DOM elements
    const coverImg = document.getElementById("currentCover");
    const titleSpan = document.getElementById("currentTitle");
    const artistSpan = document.getElementById("currentArtist");
    const playPauseBtn = document.getElementById("playPauseBtn");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const progressFill = document.getElementById("progressFill");
    const progressBarBg = document.getElementById("progressBarBg");
    const currentTimeSpan = document.getElementById("currentTime");
    const durationSpan = document.getElementById("durationTime");
    const shuffleBtn = document.getElementById("shuffleBtn");
    const repeatBtn = document.getElementById("repeatBtn");
    const stopBtn = document.getElementById("stopBtn");
    const rewind10Btn = document.getElementById("rewind10Btn");
    const infoBtn = document.getElementById("infoBtn");
    const shuffleModeBtn = document.getElementById("shuffleModeBtn");
    const songListContainer = document.getElementById("songListContainer");
    const panelTitle = document.getElementById("panelTitle");
    const globalSearch = document.getElementById("globalSearch");
    
    function saveFavs() { localStorage.setItem("anka_favs", JSON.stringify(favoriteIds)); }
    function saveLists() { localStorage.setItem("anka_lists", JSON.stringify(customLists)); }
    function saveRecent() { localStorage.setItem("anka_recent", JSON.stringify(recentPlayIds.slice(0,12))); }
    
    function getSongById(id) { return masterSongs.find(s => s.id === id); }
    
    // oynatma kuyruğunu güncelle (mevcut listeden)
    function buildQueueFromSongIds(ids, startId) {
        let queue = [...ids];
        if(queue.length === 0) queue = masterSongs.map(s => s.id);
        let startIdx = queue.findIndex(id => id === startId);
        if(startIdx === -1) { startIdx = 0; startId = queue[0]; }
        currentPlaylistQueue = queue;
        queueIndex = startIdx;
        loadAndPlaySong(startId, false);
    }
    
    function loadAndPlaySong(songId, autoPlay = true) {
        const song = getSongById(songId);
        if(!song) return;
        currentSongId = songId;
        titleSpan.innerText = song.title;
        artistSpan.innerText = song.artist;
        coverImg.src = song.cover;
        audio.src = song.url;
        audio.load();
        if(autoPlay) { audio.play(); isPlaying = true; playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>'; }
        else { isPlaying = false; playPauseBtn.innerHTML = '<i class="fas fa-play"></i>'; }
        updateRecentHistory(songId);
        updatePlayerUI();
    }
    
    function updateRecentHistory(songId) {
        recentPlayIds = recentPlayIds.filter(id => id !== songId);
        recentPlayIds.unshift(songId);
        if(recentPlayIds.length > 20) recentPlayIds.pop();
        saveRecent();
    }
    
    function updatePlayerUI() {
        if(!audio.paused) isPlaying = true;
        audio.onloadedmetadata = () => { durationSpan.innerText = formatTime(audio.duration); };
        audio.ontimeupdate = () => {
            let percent = (audio.currentTime / audio.duration) * 100;
            progressFill.style.width = percent + "%";
            currentTimeSpan.innerText = formatTime(audio.currentTime);
        };
    }
    
    function formatTime(sec) { if(isNaN(sec)) return "0:00"; let m = Math.floor(sec/60); let s = Math.floor(sec%60); return `${m}:${s<10?'0'+s:s}`; }
    
    function playCurrent() { audio.play(); isPlaying = true; playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>'; }
    function pauseCurrent() { audio.pause(); isPlaying = false; playPauseBtn.innerHTML = '<i class="fas fa-play"></i>'; }
    function nextSong() { 
        let nextIdx = queueIndex + 1;
        if(nextIdx >= currentPlaylistQueue.length) {
            if(repeatActive) nextIdx = 0;
            else return;
        }
        queueIndex = nextIdx;
        loadAndPlaySong(currentPlaylistQueue[queueIndex], true);
    }
    function prevSong() {
        let prevIdx = queueIndex - 1;
        if(prevIdx < 0) { if(repeatActive) prevIdx = currentPlaylistQueue.length-1; else return; }
        queueIndex = prevIdx;
        loadAndPlaySong(currentPlaylistQueue[queueIndex], true);
    }
    
    function renderSongList(songIds, title) {
        panelTitle.innerText = title;
        const container = songListContainer;
        container.innerHTML = "";
        songIds.forEach(sid => {
            let s = getSongById(sid);
            if(!s) return;
            const isFav = favoriteIds.includes(s.id);
            const div = document.createElement("div");
            div.className = "song-item";
            div.innerHTML = `
                <div class="song-details">
                    <strong>${s.title}</strong> <span>${s.artist}</span>
                </div>
                <div class="song-actions">
                    <i class="fav-icon ${isFav ? 'fas fa-heart' : 'far fa-heart'}" data-id="${s.id}"></i>
                    <i class="fas fa-list-ul add-to-list-btn" data-id="${s.id}"></i>
                </div>
            `;
            div.addEventListener("click", (e) => { if(!e.target.classList.contains("fav-icon") && !e.target.classList.contains("add-to-list-btn")) { 
                buildQueueFromSongIds(songIds, s.id);
            }});
            const favIcon = div.querySelector(".fav-icon");
            favIcon.addEventListener("click", (e) => { e.stopPropagation(); toggleFavorite(s.id); renderCurrentCategoryView(); });
            const listBtn = div.querySelector(".add-to-list-btn");
            listBtn.addEventListener("click", (e) => { e.stopPropagation(); showAddToListMenu(s.id); });
            container.appendChild(div);
        });
    }
    
    function toggleFavorite(songId) {
        if(favoriteIds.includes(songId)) favoriteIds = favoriteIds.filter(id => id !== songId);
        else favoriteIds.push(songId);
        saveFavs();
        if(document.getElementById("panelTitle").innerText.includes("Favoriler")) renderCurrentCategoryView();
        else renderCurrentCategoryView(); 
    }
    
    function showAddToListMenu(songId) {
        let listNames = Object.keys(customLists);
        let options = listNames.map(l => `${l}`).join(", ");
        let choice = prompt(`Listeye ekle (mevcut: ${options || "hiç liste yok"})\nVar olan liste adını yaz veya yeni liste oluştur:`);
        if(choice) {
            if(customLists[choice]) { if(!customLists[choice].includes(songId)) customLists[choice].push(songId); }
            else { customLists[choice] = [songId]; }
            saveLists(); renderSidebarLists(); alert(`"${choice}" listesine eklendi`);
        }
    }
    
    function createNewList() {
        let listName = prompt("Yeni liste adı:");
        if(listName && !customLists[listName]) { customLists[listName] = []; saveLists(); renderSidebarLists(); }
        else if(listName) alert("Bu isimde liste var!");
    }
    
    function renderSidebarLists() {
        const container = document.getElementById("customListsContainer");
        container.innerHTML = "";
        for(let [listName, songIds] of Object.entries(customLists)) {
            let div = document.createElement("div");
            div.className = "menu-item playlist-item";
            div.innerHTML = `<i class="fas fa-music"></i> <span>${listName} (${songIds.length})</span> <i class="fas fa-trash-alt" style="margin-left:auto; font-size:0.8rem;"></i>`;
            div.addEventListener("click", (e) => { if(e.target.classList.contains("fa-trash-alt")) { delete customLists[listName]; saveLists(); renderSidebarLists(); renderCurrentCategoryView(); } else { showCustomList(listName); } });
            container.appendChild(div);
        }
    }
    
    function showCustomList(listName) {
        let songs = customLists[listName] || [];
        let songData = songs.filter(id => getSongById(id)).map(s => s);
        renderSongList(songs, `📀 ${listName}`);
    }
    
    function getSongsByCategory(cat) {
        if(cat === "top") return masterSongs.sort((a,b)=>b.playCount-a.playCount).map(s=>s.id);
        if(cat === "recent") return recentPlayIds.filter(id=>getSongById(id));
        if(cat === "hits") return masterSongs.filter(s=>s.category.includes("hit")).map(s=>s.id);
        if(cat === "foreign") return masterSongs.filter(s=>s.category.includes("foreign")).map(s=>s.id);
        if(cat === "favorites") return favoriteIds;
        return masterSongs.map(s=>s.id);
    }
    
    let currentDisplayCategory = "all";
    function renderCurrentCategoryView() {
        let ids = [];
        let title = "";
        if(currentDisplayCategory === "top") { ids = getSongsByCategory("top"); title = "🏆 En Çok Dinlenenler"; }
        else if(currentDisplayCategory === "recent") { ids = getSongsByCategory("recent"); title = "🕘 Son Dinlenenler"; }
        else if(currentDisplayCategory === "hits") { ids = getSongsByCategory("hits"); title = "🔥 Hit Müzikler"; }
        else if(currentDisplayCategory === "foreign") { ids = getSongsByCategory("foreign"); title = "🌍 Yabancı Müzikler"; }
        else if(currentDisplayCategory === "favorites") { ids = getSongsByCategory("favorites"); title = "❤️ Favorilerim"; }
        else { ids = masterSongs.map(s=>s.id); title = "🎵 Tüm Şarkılar"; }
        renderSongList(ids, title);
    }
    
    function searchSongs(keyword) {
        if(!keyword.trim()) { renderCurrentCategoryView(); return; }
        const filtered = masterSongs.filter(s => s.title.toLowerCase().includes(keyword.toLowerCase()) || s.artist.toLowerCase().includes(keyword.toLowerCase()));
        renderSongList(filtered.map(s=>s.id), `🔍 Arama: "${keyword}"`);
    }
    
    // event listeners
    playPauseBtn.addEventListener("click", () => { if(audio.paused) playCurrent(); else pauseCurrent(); });
    nextBtn.addEventListener("click", nextSong);
    prevBtn.addEventListener("click", prevSong);
    stopBtn.addEventListener("click", () => { audio.pause(); audio.currentTime=0; isPlaying=false; playPauseBtn.innerHTML='<i class="fas fa-play"></i>'; });
    rewind10Btn.addEventListener("click", () => { audio.currentTime = Math.max(0, audio.currentTime-10); });
    infoBtn.addEventListener("click", () => { let s=getSongById(currentSongId); alert(`${s.title} - ${s.artist}\nANKA MÜZİK keyfini çıkarın.`); });
    shuffleModeBtn.addEventListener("click", () => { shuffleActive = !shuffleActive; if(shuffleActive){ let shuffled = [...currentPlaylistQueue]; for(let i=shuffled.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[shuffled[i],shuffled[j]]=[shuffled[j],shuffled[i]];} currentPlaylistQueue = shuffled; queueIndex = 0; loadAndPlaySong(currentPlaylistQueue[0],true); } else alert("Karıştırma modu geçici, yeniden düzenlenir."); });
    repeatBtn.addEventListener("click", () => { repeatActive = !repeatActive; repeatBtn.style.color = repeatActive ? "#F0B90B" : "white"; });
    shuffleBtn.addEventListener("click", () => { let shuffled = [...masterSongs.map(s=>s.id)]; for(let i=shuffled.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[shuffled[i],shuffled[j]]=[shuffled[j],shuffled[i]];} buildQueueFromSongIds(shuffled, currentSongId); });
    progressBarBg.addEventListener("click", (e) => { let rect = progressBarBg.getBoundingClientRect(); let percent = (e.clientX - rect.left)/rect.width; audio.currentTime = percent * audio.duration; });
    audio.onended = () => { nextSong(); };
    
    // menü işlemleri
    document.querySelectorAll(".menu-item[data-category]").forEach(el => {
        el.addEventListener("click", () => {
            const cat = el.getAttribute("data-category");
            currentDisplayCategory = cat;
            renderCurrentCategoryView();
            closeSidebar();
        });
    });
    document.getElementById("createListBtn").addEventListener("click", () => { createNewList(); closeSidebar(); });
    document.getElementById("homePageBtn").addEventListener("click", () => { currentDisplayCategory = "all"; renderCurrentCategoryView(); });
    globalSearch.addEventListener("input", (e) => searchSongs(e.target.value));
    function closeSidebar() { document.getElementById("sidebar").classList.remove("open"); document.getElementById("menuOverlay").classList.remove("active"); }
    document.getElementById("hamburgerBtn").addEventListener("click", () => { document.getElementById("sidebar").classList.add("open"); document.getElementById("menuOverlay").classList.add("active"); });
    document.getElementById("closeMenuBtn").addEventListener("click", closeSidebar);
    document.getElementById("menuOverlay").addEventListener("click", closeSidebar);
    
    function init() {
        renderSidebarLists();
        let defaultQueue = masterSongs.map(s=>s.id);
        buildQueueFromSongIds(defaultQueue, "s1");
        renderCurrentCategoryView();
        audio.volume = 0.7;
    }
    init();
</script>
</body>
</html>
